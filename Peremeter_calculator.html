<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perimeter Calculator</title>

    <style>
        body {
            margin: 0;
            padding: 50px;
            text-align: center;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>

    <h1>Perimeter Calculator</h1>

    <script>

        var choice = prompt("Welcome to Perimeter Calculator. \n Please Enter your Choice. \n1.Perimeter of Rectangle. \n2.Perimeter of Triangle. \n3.Perimeter of Circle. \n4.Perimeter of Square");


        if (choice == '1') {

            var l = prompt('Enter the Length')

            var b = prompt('Enter the breadth')

            var result = 2 * (Number(l) + Number(b))

            alert('The Perimeter of Rectangle is ' + result)

        }


        if (choice == '2') {

            var a = prompt('Enter the first side')

            var b = prompt('Enter the second side')

            var c = prompt('Enter the third side')

            var result = Number(a) + Number(b) + Number(c)

            alert('The Perimeter of Triangle is ' + result)

        }


        if (choice == '3') {

            var r = prompt("Enter the radius")

            var result = 2 * 3.14 * Number(r)

            alert('The Perimeter of Circle is ' + result)

        }


        if (choice == '4') {

            var s = prompt("Enter the side of Square")

            var result = 4 * Number(s)

            alert('The Perimeter of Square is ' + result)

        }

    </script>

</body>

</html>
