<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>

    <style>
        body {
            margin: 0;
            padding: 50px;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h2 {
            margin-bottom: 25px;
        }

        #mycalander {
            margin: 20px;
            padding: 20px;
            font-size: 30px;
        }
    </style>

</head>

<body>

    <h2>Calendar</h2>

    <div id="mycalander"></div>


    <script>

        function showDate() {

            var date = new Date();

            var dateNumber = date.getDate();

            var month = date.getMonth() + 1;

            var year = date.getFullYear();

            var day = date.getDay();

            var todays;


            if (day == 0) {
                todays = "Sunday";
            }

            if (day == 1) {
                todays = "Monday";
            }

            if (day == 2) {
                todays = "Tuesday";
            }

            if (day == 3) {
                todays = "Wednesday";
            }

            if (day == 4) {
                todays = "Thursday";
            }

            if (day == 5) {
                todays = "Friday";
            }

            if (day == 6) {
                todays = "Saturday";
            }


            var calander =
                "Date: " + dateNumber + "/" + month + "/" + year +
                " Day: " + todays;


            document.getElementById("mycalander").innerText =
                calander;

        }


        showDate();

    </script>

</body>

</html>
